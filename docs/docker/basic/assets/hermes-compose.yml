services:
  hermes:  # Agent 核心服务
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"  # 暴露 API 端口，供仪表盘或其他工具调用
    volumes:
      - ~/.hermes:/opt/data  # 共享数据卷
    environment:
      - API_SERVER_ENABLED=true  # 必须设置为 true，以启动内置的 HTTP API 服务器。
      - API_SERVER_HOST=0.0.0.0   # 必须设置为 0.0.0.0，以允许 Dashboard 容器访问。
      - API_SERVER_KEY=Abcd1234  # 用于 API 鉴权的密钥，建议设置为一个强密码。
    networks:
      - hermes-net
  dashboard:  # 仪表盘服务
    image: nousresearch/hermes-agent:latest  # 注意：使用同一个官方镜像
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure  # 关键：启动仪表盘模式
    ports:
      - "9119:9119"  # 将容器的 9119 端口映射到主机，以便访问 Web 界面
    volumes:
      - ./hermes/data:/opt/data  # 共享同一个数据卷，读取 Agent 数据
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642  # 告诉仪表盘 Agent 服务的地址
    networks:
      - hermes-net
    depends_on:
      - hermes
networks:
  hermes-net:
    driver: bridge